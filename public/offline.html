<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 상태</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: linear-gradient(135deg, #f6f2ea 0%, #efe6da 100%);
        color: #1f2937;
      }

      main {
        width: min(540px, calc(100% - 32px));
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 252, 246, 0.92);
        box-shadow: 0 20px 45px rgba(73, 42, 19, 0.14);
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>네트워크가 복구되면 방 정보와 실시간 위치 공유를 다시 사용할 수 있습니다.</p>
    </main>
  </body>
</html>
